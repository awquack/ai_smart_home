<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – AI Security Dashboard</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem;
    }
    .login-icon {
      font-size: 3rem;
      color: #58a6ff;
    }
    .form-control {
      background: #0d1117;
      border-color: #30363d;
      color: #e6edf3;
    }
    .form-control:focus {
      background: #0d1117;
      border-color: #58a6ff;
      color: #e6edf3;
      box-shadow: 0 0 0 3px rgba(88,166,255,.15);
    }
    .btn-primary {
      background: #238636;
      border-color: #238636;
    }
    .btn-primary:hover { background: #2ea043; border-color: #2ea043; }
  </style>
</head>
<body>
  <div class="login-card text-center">

    <div class="login-icon mb-3">
      <i class="fa-solid fa-shield-halved"></i>
    </div>
    <h4 class="mb-1 fw-bold">AI Security Dashboard</h4>
    <p class="text-secondary mb-4" style="font-size:.9rem;">
      Local deployment &nbsp;·&nbsp; Enter credentials to continue
    </p>

    {% if error %}
    <div class="alert alert-danger py-2 text-start" role="alert">
      <i class="fa-solid fa-circle-exclamation me-2"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3 text-start">
        <label class="form-label text-secondary" for="username">Username</label>
        <div class="input-group">
          <span class="input-group-text" style="background:#0d1117; border-color:#30363d;">
            <i class="fa-solid fa-user text-secondary"></i>
          </span>
          <input type="text" class="form-control" id="username"
                 name="username" placeholder="admin" autocomplete="username" required />
        </div>
      </div>

      <div class="mb-4 text-start">
        <label class="form-label text-secondary" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:#0d1117; border-color:#30363d;">
            <i class="fa-solid fa-lock text-secondary"></i>
          </span>
          <input type="password" class="form-control" id="password"
                 name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>

    <p class="text-secondary mt-4 mb-0" style="font-size:.75rem;">
      Access restricted to authorised users only
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
